base_images:
  cli:
    name: "4.10"
    namespace: ocp
    tag: cli
binary_build_commands: make bin
build_root:
  project_image:
    dockerfile_path: .ci/base-image/Dockerfile
images:
- context_dir: /
  dockerfile_path: Dockerfile.ci
  from: src
  inputs:
    cli:
      paths:
      - destination_dir: .
        source_path: /usr/bin/oc
  to: gitops-service-image
releases:
  latest:
    release:
      architecture: amd64
      channel: stable
      version: "4.11"
resources:
  '*':
    limits:
      memory: 4Gi
    requests:
      cpu: 100m
      memory: 200Mi
tests:
- as: managed-gitops-e2e-tests
  cluster_claim:
    architecture: amd64
    cloud: aws
    owner: openshift-ci
    product: ocp
    timeout: 1h0m0s
    version: "4.11"
  steps:
    test:
    - as: managed-gitops-e2e-step
      commands: scripts/openshiftci-presubmit-e2e-tests.sh
      dependencies:
      - env: CI_IMAGE
        name: gitops-service-image
      from: src
      resources:
        requests:
          cpu: 100m
    workflow: generic-claim
zz_generated_metadata:
  branch: openShiftCI
  org: redhat-appstudio
  repo: managed-gitops
